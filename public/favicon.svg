<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="10" fill="#1e293b"/>
  <!-- Grid lines -->
  <g stroke="#475569" stroke-width="0.5">
    <line x1="3" y1="16" x2="45" y2="16"/>
    <line x1="3" y1="32" x2="45" y2="32"/>
    <line x1="16" y1="3" x2="16" y2="45"/>
    <line x1="32" y1="3" x2="32" y2="45"/>
  </g>
  <!-- Thick box borders -->
  <rect x="3" y="3" width="42" height="42" rx="8" stroke="#64748b" stroke-width="2.5"/>
  <line x1="3" y1="24" x2="45" y2="24" stroke="#64748b" stroke-width="2"/>
  <line x1="24" y1="3" x2="24" y2="45" stroke="#64748b" stroke-width="2"/>
  <!-- Some numbers -->
  <text x="10" y="14" fill="#94a3b8" font-size="6" font-family="sans-serif" text-anchor="middle">3</text>
  <text x="23" y="14" fill="#3b82f6" font-size="6" font-family="sans-serif" text-anchor="middle">6</text>
  <text x="36" y="14" fill="#94a3b8" font-size="6" font-family="sans-serif" text-anchor="middle">1</text>
  <text x="10" y="27" fill="#3b82f6" font-size="6" font-family="sans-serif" text-anchor="middle">2</text>
  <text x="23" y="27" fill="#94a3b8" font-size="6" font-family="sans-serif" text-anchor="middle">5</text>
  <text x="36" y="27" fill="#94a3b8" font-size="6" font-family="sans-serif" text-anchor="middle">4</text>
  <text x="10" y="40" fill="#94a3b8" font-size="6" font-family="sans-serif" text-anchor="middle">1</text>
  <text x="23" y="40" fill="#3b82f6" font-size="6" font-family="sans-serif" text-anchor="middle">3</text>
  <text x="36" y="40" fill="#3b82f6" font-size="6" font-family="sans-serif" text-anchor="middle">6</text>
</svg>
